<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>營業項目編號對應台北市土管歸組</title>
    
    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-5YQY4RT9H2"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());

      gtag('config', 'G-5YQY4RT9H2');
    </script>

    <!-- 引入 Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 引入 React 與 ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- 引入 Babel -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif, 'Microsoft JhengHei'; background-color: #f3f4f6; }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background-color: #cbd5e1; border-radius: 20px; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // --- 設定區：您部署 Google Apps Script 後取得的「網頁應用程式網址」 ---
        const GAS_URL = "https://script.google.com/macros/s/AKfycbzUDD23PmWZpEw3Nt_nlavTVLgxucAhxKshpF4mfyIEYS3HY12pGjZ3zZmrVKVq7FBC/exec";

        function App() {
            const [mainData, setMainData] = useState([]);
            const [groupData, setGroupData] = useState([]);
            const [buildingData, setBuildingData] = useState([]);
            const [isLoaded, setIsLoaded] = useState(false);
            const [errorMsg, setErrorMsg] = useState('');
            const [searchTerm, setSearchTerm] = useState('');
            const [filteredData, setFilteredData] = useState([]);
            const [selectedItem, setSelectedItem] = useState(null);
            const [showDropdown, setShowDropdown] = useState(false);
            const dropdownRef = useRef(null);

            useEffect(() => {
                function handleClickOutside(event) {
                    if (dropdownRef.current && !dropdownRef.current.contains(event.target)) {
                        setShowDropdown(false);
                    }
                }
                document.addEventListener("mousedown", handleClickOutside);
                return () => document.removeEventListener("mousedown", handleClickOutside);
            }, []);

            // 呼叫 GAS API 取得 JSON 資料
            const fetchJsonData = async (type) => {
                if (!GAS_URL) {
                    return [];
                }
                const response = await fetch(`${GAS_URL}?type=${type}`);
                if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
                const data = await response.json();
                if (data.error) throw new Error(data.error);
                return data;
            };

            useEffect(() => {
                const loadData = async () => {
                    try {
                        if (!GAS_URL) {
                            throw new Error("尚未設定 Google Apps Script (GAS) URL。請確認程式碼設定。");
                        }

                        // 同時向 GAS 發送三個請求，分別取得 main, group, building 的資料
                        const [mainRaw, groupRaw, buildingRaw] = await Promise.all([
                            fetchJsonData('main'),
                            fetchJsonData('group').catch(e => {
                                console.warn("組別資料載入失敗", e);
                                return [];
                            }),
                            fetchJsonData('building').catch(e => {
                                console.warn("建管歸組資料載入失敗", e);
                                return [];
                            })
                        ]);

                        if (!mainRaw || mainRaw.length === 0) {
                            throw new Error("讀取到的資料為空，請確認 Apps Script 權限或試算表 ID。");
                        }

                        // 因為在 GAS 中已經處理過標題的空白，這裡可以直接設定
                        setMainData(mainRaw);
                        setGroupData(groupRaw);
                        setBuildingData(buildingRaw);
                        setIsLoaded(true);
                    } catch (error) {
                        console.error("載入失敗:", error);
                        setErrorMsg(`連線至資料庫時發生錯誤：\n${error.message}\n\n請確認您的 GAS API 網址是否正確，且已部署為「所有人」皆可存取。`);
                    }
                };

                loadData();
            }, []);

            const handleSearch = (e) => {
                const value = e.target.value;
                setSearchTerm(value);
                setSelectedItem(null);

                if (value.trim() === '') {
                    setFilteredData([]);
                    setShowDropdown(false);
                    return;
                }

                const upperTerm = value.toUpperCase();
                const results = mainData.filter(item => {
                    const code = item['營業項目代碼'] ? String(item['營業項目代碼']).toUpperCase() : '';
                    const name = item['營業項目'] ? String(item['營業項目']).toUpperCase() : '';
                    return code.includes(upperTerm) || name.includes(upperTerm);
                });

                setFilteredData(results);
                setShowDropdown(true);
            };

            const selectItem = (item) => {
                setSearchTerm(item['營業項目代碼']);
                setSelectedItem(item);
                setShowDropdown(false);
            };

            const SearchIcon = () => (
                <svg xmlns="http://www.w3.org/2000/svg" className="h-5 w-5 text-gray-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
                </svg>
            );

            if (errorMsg) {
                return (
                    <div className="min-h-screen flex items-center justify-center p-4">
                        <div className="max-w-md w-full bg-white rounded-2xl shadow-xl p-8 border border-red-100">
                            <h1 className="text-xl font-bold text-red-600 mb-4 flex items-center gap-2">
                                <svg xmlns="http://www.w3.org/2000/svg" className="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                    <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
                                </svg>
                                雲端連線失敗
                            </h1>
                            <p className="text-gray-600 whitespace-pre-wrap leading-relaxed bg-red-50 p-4 rounded-lg text-sm">{errorMsg}</p>
                        </div>
                    </div>
                );
            }

            if (!isLoaded) {
                return (
                    <div className="min-h-screen flex items-center justify-center">
                        <div className="flex flex-col items-center">
                            <div className="animate-spin rounded-full h-12 w-12 border-b-2 border-blue-600 mb-4"></div>
                            <p className="text-gray-500 font-medium">正在連線至 API 資料庫...</p>
                        </div>
                    </div>
                );
            }

            return (
                <div className="min-h-screen p-4 md:p-8 max-w-5xl mx-auto">
                    <div className="mb-8">
                        <h1 className="text-3xl font-bold text-gray-800 mb-2">營業項目編號對應台北市土管歸組</h1>
                        <div className="text-sm text-gray-600 bg-gray-100 inline-block px-4 py-3 rounded-md mb-2 leading-relaxed">
                            <div className="font-bold mb-1 text-gray-700">資料更新：</div>
                            <ol className="list-decimal list-inside ml-1">
                                <li>113.07.09 經濟部營業項目總表_對應土管歸組及歸目</li>
                                <li>114.07.09 臺北市土地使用分區管制自治條例</li>
                            </ol>
                        </div>
                        <p className="text-xs text-gray-400 mt-1">透過 Google API 同步 | 主資料: {mainData.length} 筆</p>
                    </div>

                    <div className="relative mb-8 z-50" ref={dropdownRef}>
                        <div className="relative">
                            <div className="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                                <SearchIcon />
                            </div>
                            <input
                                type="text"
                                className="block w-full pl-12 pr-4 py-4 bg-white border-2 border-transparent shadow-sm rounded-xl text-lg focus:ring-4 focus:ring-blue-100 focus:border-blue-400 outline-none transition-all"
                                placeholder="輸入代碼或名稱..."
                                value={searchTerm}
                                onChange={handleSearch}
                                onFocus={() => { if (searchTerm) setShowDropdown(true); }}
                            />
                        </div>

                        {showDropdown && filteredData.length > 0 && (
                            <div className="absolute w-full mt-2 bg-white rounded-xl shadow-2xl border border-gray-100 max-h-80 overflow-y-auto custom-scrollbar">
                                {filteredData.slice(0, 50).map((item, index) => (
                                    <div 
                                        key={index}
                                        className="px-4 py-3 hover:bg-blue-50 cursor-pointer border-b border-gray-50 last:border-0 flex items-center gap-3"
                                        onClick={() => selectItem(item)}
                                    >
                                        <span className="font-mono font-bold text-blue-600 bg-blue-100 px-2 py-1 rounded text-sm">{item['營業項目代碼']}</span>
                                        <span className="text-gray-700 font-medium">{item['營業項目']}</span>
                                    </div>
                                ))}
                            </div>
                        )}
                    </div>

                    {selectedItem && (
                        <div className="bg-white rounded-2xl shadow-sm border border-gray-200 overflow-hidden animate-fade-in">
                            <div className="bg-gradient-to-r from-blue-600 to-indigo-700 px-6 py-6 text-white">
                                <span className="bg-white/20 text-white border border-white/30 px-3 py-1 rounded-lg font-mono text-xl font-bold block mb-2 w-fit">
                                    {selectedItem['營業項目代碼']}
                                </span>
                                <h2 className="text-3xl font-extrabold">{selectedItem['營業項目']}</h2>
                            </div>

                            <div className="p-6 md:p-8">
                                {(() => {
                                    // 動態抓取欄位名稱，避免因為「建管歸組」或「建築歸組」等字眼差異而抓不到資料
                                    const landKey = Object.keys(selectedItem).find(k => k.includes('土管'));
                                    const landValue = landKey ? selectedItem[landKey] : null;
                                    
                                    const buildKey = Object.keys(selectedItem).find(k => k.includes('建管') || k.includes('建築'));
                                    const buildValue = buildKey ? selectedItem[buildKey] : null;

                                    // 動態從 buildingData 找出對應的「組別定義」
                                    let buildingDef = null;
                                    if (buildValue && buildingData.length > 0) {
                                        const bKeyName = Object.keys(buildingData[0])[0];
                                        const matchedBItem = buildingData.find(b => String(b[bKeyName]) === String(buildValue));
                                        if (matchedBItem) {
                                            const defKey = Object.keys(matchedBItem).find(k => k.includes('組別定義'));
                                            if (defKey) {
                                                buildingDef = matchedBItem[defKey];
                                            }
                                        }
                                    }

                                    return (
                                        <React.Fragment>
                                            <div className="mb-6 bg-gray-50 p-6 rounded-xl border border-gray-200 text-gray-800">
                                                <h3 className="text-sm font-bold text-gray-500 mb-2 uppercase tracking-widest">定義內容</h3>
                                                <p className="text-lg leading-relaxed">{selectedItem['定義內容'] || '無詳細說明'}</p>
                                            </div>

                                            <div className="flex flex-wrap gap-4 mb-6">
                                                {landValue && (
                                                    <div className="flex-1 min-w-[200px] bg-green-50 border border-green-200 rounded-xl p-4 flex items-center gap-4 shadow-sm">
                                                        <div className="bg-green-200 text-green-700 p-3 rounded-lg">
                                                            <svg xmlns="http://www.w3.org/2000/svg" className="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                                                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z" />
                                                            </svg>
                                                        </div>
                                                        <div>
                                                            <div className="text-xs font-bold text-green-600 uppercase tracking-widest mb-1">{landKey || '臺北市土管歸組'}</div>
                                                            <div className="text-2xl font-black text-green-900">{landValue}</div>
                                                        </div>
                                                    </div>
                                                )}
                                                {buildValue && (
                                                    <div className="flex-1 min-w-[200px] bg-purple-50 border border-purple-200 rounded-xl p-4 flex items-center gap-4 shadow-sm">
                                                        <div className="bg-purple-200 text-purple-700 p-3 rounded-lg">
                                                            <svg xmlns="http://www.w3.org/2000/svg" className="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                                                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4" />
                                                            </svg>
                                                        </div>
                                                        <div>
                                                            <div className="text-xs font-bold text-purple-600 uppercase tracking-widest mb-1">{buildKey || '建管歸組'}</div>
                                                            <div className="text-2xl font-black text-purple-900">{buildValue}</div>
                                                        </div>
                                                    </div>
                                                )}
                                            </div>

                                            <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                                {(() => {
                                                    // 整理要顯示的項目，並將動態抓取到的「組別定義」加進來一起排序
                                                    let entries = Object.entries(selectedItem)
                                                        .filter(([key]) => !['營業項目代碼', '營業項目', '定義內容', '', landKey, buildKey].includes(key));
                                                    
                                                    if (buildingDef) {
                                                        entries.push(['組別定義', buildingDef]);
                                                    }

                                                    return entries.sort(([keyA], [keyB]) => {
                                                        // 自訂排序：確保「組別定義」排在「本業目別」之後、「限辦歸組」之前
                                                        const customOrder = ['本業目別', '組別定義', '限辦歸組', '限辦目別', '策略型產業'];
                                                        let indexA = customOrder.indexOf(keyA);
                                                        let indexB = customOrder.indexOf(keyB);
                                                        
                                                        // 若不在自訂名單內，則維持在後方顯示
                                                        if (indexA === -1) indexA = 999;
                                                        if (indexB === -1) indexB = 999;
                                                        
                                                        return indexA - indexB;
                                                    })
                                                    .map(([key, value]) => (
                                                        <div key={key} className="bg-gray-50 p-5 rounded-xl border border-gray-100">
                                                            <div className="text-xs font-bold text-gray-500 mb-1">{key}</div>
                                                            <div className="text-gray-900 font-medium whitespace-pre-wrap">{value || '-'}</div>
                                                        </div>
                                                    ));
                                                })()}
                                            </div>
                                        </React.Fragment>
                                    );
                                })()}

                                {(() => {
                                    // 下方關聯附屬組別表格，同樣改為動態抓取以防錯誤
                                    const landKey = Object.keys(selectedItem).find(k => k.includes('土管'));
                                    const targetGroupNum = landKey ? selectedItem[landKey] : null;
                                    
                                    if (!targetGroupNum || groupData.length === 0) return null;
                                    
                                    // 抓取第一欄作為對照用的「土管歸組編號」
                                    const groupKeyName = Object.keys(groupData[0])[0];
                                    const matchedItems = groupData.filter(g => String(g[groupKeyName]) === String(targetGroupNum));
                                    
                                    if (matchedItems.length === 0) return null;

                                    // 抓取第二欄與第三欄的標題名稱 (如果沒有標題，預設顯示為使用組、使用項目)
                                    const displayKeys = Object.keys(groupData[0]).filter(k => k !== groupKeyName);
                                    const col2Name = displayKeys[0] || '使用組';
                                    const col3Name = displayKeys[1] || '使用項目';

                                    return (
                                        <div className="mt-8 bg-green-50 rounded-xl border border-green-200 overflow-hidden">
                                            <div className="px-6 py-4 bg-green-100/60 font-bold text-green-800">
                                                土管歸組資料 (第 {targetGroupNum} 組)
                                            </div>
                                            <div className="overflow-x-auto">
                                                <table className="w-full text-sm">
                                                    <thead className="bg-green-200/50 text-green-800 text-left">
                                                        <tr>
                                                            <th className="px-6 py-3 w-1/3">{col2Name}</th>
                                                            <th className="px-6 py-3 w-2/3">{col3Name}</th>
                                                        </tr>
                                                    </thead>
                                                    <tbody>
                                                        {matchedItems.map((g, i) => {
                                                            return (
                                                                <tr key={i} className="border-b border-green-100 bg-white">
                                                                    <td className="px-6 py-4 font-bold text-green-800 align-top whitespace-pre-wrap">{g[displayKeys[0]]}</td>
                                                                    <td className="px-6 py-4 whitespace-pre-wrap">{g[displayKeys[1]]}</td>
                                                                </tr>
                                                            );
                                                        })}
                                                    </tbody>
                                                </table>
                                            </div>
                                        </div>
                                    );
                                })()}

                                {(() => {
                                    // 下方關聯「建管歸組/使用項目」表格
                                    const buildKey = Object.keys(selectedItem).find(k => k.includes('建管') || k.includes('建築'));
                                    const buildValue = buildKey ? selectedItem[buildKey] : null;
                                    
                                    if (!buildValue || buildingData.length === 0) return null;
                                    
                                    // 抓取第一欄作為對照用的「建管歸組編號」
                                    const bKeyName = Object.keys(buildingData[0])[0];
                                    const matchedBItems = buildingData.filter(b => String(b[bKeyName]) === String(buildValue));
                                    
                                    if (matchedBItems.length === 0) return null;

                                    // 抓取其他欄位名稱 (排除已經獨立顯示的組別定義，預設顯示為使用項目舉例)
                                    const displayBKeys = Object.keys(buildingData[0]).filter(k => k !== bKeyName && !k.includes('組別定義'));
                                    const col2Name = displayBKeys[0] || '使用項目舉例';

                                    return (
                                        <div className="mt-8 bg-purple-50 rounded-xl border border-purple-200 overflow-hidden">
                                            <div className="px-6 py-4 bg-purple-100/60 font-bold text-purple-800">
                                                建管使用類組說明 ({buildValue})
                                            </div>
                                            <div className="overflow-x-auto">
                                                <table className="w-full text-sm">
                                                    <thead className="bg-purple-200/50 text-purple-800 text-left">
                                                        <tr>
                                                            <th className="px-6 py-3 w-1/4">建築類組</th>
                                                            <th className="px-6 py-3 w-3/4">{col2Name}</th>
                                                        </tr>
                                                    </thead>
                                                    <tbody>
                                                        {matchedBItems.map((b, i) => {
                                                            const rawText = b[displayBKeys[0]] || '';
                                                            // 遇到半形或全形分號時，在後方加上換行符號
                                                            const formattedText = String(rawText).replace(/;/g, ';\n').replace(/；/g, '；\n');
                                                            
                                                            return (
                                                                <tr key={i} className="border-b border-purple-100 bg-white hover:bg-purple-50/50 transition-colors">
                                                                    <td className="px-6 py-4 font-bold text-purple-800 align-top whitespace-pre-wrap">{b[bKeyName]}</td>
                                                                    <td className="px-6 py-4 whitespace-pre-wrap text-gray-700 leading-relaxed">{formattedText}</td>
                                                                </tr>
                                                            );
                                                        })}
                                                    </tbody>
                                                </table>
                                            </div>
                                        </div>
                                    );
                                })()}
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>

    <style>
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fade-in { animation: fadeIn 0.4s ease-out forwards; }
    </style>
</body>
</html>
