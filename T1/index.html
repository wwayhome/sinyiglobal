            </div>

            {/* 步驟一：選擇產品類別 */}
            <div className="bg-white rounded-xl shadow-sm p-6">
              <h2 className="text-lg font-bold text-gray-800 mb-4 flex items-center">
                <span className="bg-blue-100 text-blue-700 w-6 h-6 rounded-full inline-flex items-center justify-center text-sm mr-2">1</span>
                請先選取產品類別
              </h2>
              <div className="grid grid-cols-2 md:grid-cols-5 gap-3">
                {PRODUCT_TYPES.map(type => (
                  <button
                    key={type}
                    onClick={() => setActiveProduct(type)}
                    className={`py-3 px-4 rounded-lg font-medium transition-all duration-200 border-2 
                      ${activeProduct === type 
                        ? 'border-blue-600 bg-blue-600 text-white shadow-md' 
                        : 'border-gray-200 bg-white text-gray-600 hover:border-blue-300 hover:bg-gray-50'
                      }`}
                  >
                    {type}
                  </button>
                ))}
              </div>
            </div>

            {/* 上下排版：上方選項 + 下方結果 */}
            <div className="flex flex-col gap-6">
              
              {/* 步驟二：選取物件特色 */}
              <div className="bg-white rounded-xl shadow-sm p-6 w-full">
                <div className="mb-6 border-b pb-6">
                  <h2 className="text-lg font-bold text-gray-800 flex items-center mb-4">
                    <span className="bg-blue-100 text-blue-700 w-6 h-6 rounded-full inline-flex items-center justify-center text-sm mr-2">2</span>
                    請從下面的介紹選取8個物件特色
                  </h2>
                  
                  {/* 獨立置中且放大的選取進度提示 */}
                  <div className="flex justify-center">
                    <span className={`px-8 py-3 rounded-full text-xl md:text-2xl font-bold shadow-sm tracking-wide transition-colors border-2 ${
                      selectedFeatures.length === MAX_SELECTIONS 
                        ? 'bg-green-100 text-green-700 border-green-400' 
                        : 'bg-blue-50 text-blue-700 border-blue-300'
                    }`}>
                      你已經選取 {selectedFeatures.length}/{MAX_SELECTIONS} 項目
                    </span>
                  </div>
                </div>

                {/* 五大分類 Grid */}
                <div className="grid grid-cols-1 md:grid-cols-3 lg:grid-cols-5 gap-6">
                  {CATEGORIES.map(category => (
                    <div key={category} className="flex flex-col">
                      <div className="bg-gray-800 text-white text-center py-2 rounded-t-lg font-bold text-sm tracking-wider">
                        {category}
                      </div>
                      <div className="bg-gray-50 p-2 rounded-b-lg border border-t-0 border-gray-200 flex-grow">
                        <div className="flex flex-col gap-2">
                          {currentData[category]?.map((item, index) => {
                            const isSelected = selectedFeatures.includes(item);
                            const isDisabled = !isSelected && selectedFeatures.length >= MAX_SELECTIONS;
                            return (
                              <button
                                key={index}
                                onClick={() => toggleFeature(item)}
                                disabled={isDisabled}
                                className={`
                                  text-left px-3 py-2 rounded text-sm transition-all duration-150 flex items-start gap-2
                                  ${isSelected 
                                    ? 'bg-blue-600 text-white shadow-md' 
                                    : isDisabled 
                                      ? 'bg-gray-100 text-gray-400 cursor-not-allowed' 
                                      : 'bg-white text-gray-700 hover:bg-blue-50 border border-gray-200'}
                                `}
                              >
                                <div className="mt-0.5 shrink-0">
                                  {isSelected ? <CheckCircle2 size={16} /> : <div className="w-4 h-4 rounded-full border border-gray-300"></div>}
                                </div>
                                <span className="leading-snug">{item}</span>
                              </button>
                            );
                          })}
                        </div>
                      </div>
                    </div>
                  ))}
                </div>
              </div>

              {/* 下方：已選項目清單區 */}
              <div className="bg-white rounded-xl shadow-sm p-6 w-full flex flex-col">
                 <div className="flex justify-between items-center mb-4">
                    <h3 className="text-lg font-bold text-gray-800 flex items-center gap-2">
                      <CheckCircle2 className="text-blue-600" />
                      已選特色區
                    </h3>
                    {selectedFeatures.length > 0 && (
                      <button onClick={clearAll} className="text-red-500 hover:text-red-700 text-sm flex items-center gap-1">
                        <Trash2 size={14} /> 清空
                      </button>
                    )}
                 </div>

                 {/* 網格排列：已選項目 */}
                 <div className="grid grid-cols-2 md:grid-cols-4 gap-4 mb-6">
                   {[...Array(MAX_SELECTIONS)].map((_, i) => (
                     <div 
                      key={i} 
                      className={`
                        flex items-center p-3 rounded-lg border-2 border-dashed
                        ${selectedFeatures[i] 
                          ? 'border-blue-300 bg-blue-50 text-blue-800 font-medium' 
                          : 'border-gray-200 bg-gray-50 text-gray-400'}
                      `}
                     >
                       <span className="w-6 font-bold opacity-50 text-sm mr-2">#{i + 1}</span>
                       <span className="truncate">{selectedFeatures[i] || '尚未選取'}</span>
                     </div>
                   ))}
                 </div>

                 <div className="flex flex-col items-center">
                     <button
                       onClick={handleCopy}
                       disabled={selectedFeatures.length === 0}
                       className={`
                         w-full md:w-1/2 py-4 rounded-lg font-bold text-lg flex items-center justify-center gap-2 transition-all
                         ${selectedFeatures.length > 0 
                            ? copySuccess 
                                ? 'bg-green-500 text-white hover:bg-green-600' 
                                : 'bg-blue-600 text-white hover:bg-blue-700 shadow-lg hover:shadow-xl'
                            : 'bg-gray-200 text-gray-400 cursor-not-allowed'}
                       `}
                     >
                       {copySuccess ? (
                         <>
                          <Check size={20} /> 已複製文字！
                         </>
                       ) : (
                         <>
                          <Copy size={20} /> 一鍵複製特色文字
                         </>
                       )}
                     </button>
                     {selectedFeatures.length === 0 && (
                       <p className="text-center text-sm text-gray-400 mt-3">請先選取至少一項特色</p>
                     )}
                 </div>
              </div>

            </div>
          </div>
        </div>
      );
    }

    // 渲染應用程式
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
