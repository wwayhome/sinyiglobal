<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>辦公空間需求計算器 (專業仲介版)</title>
    
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- PDF Generation Libraries -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

    <!-- Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap');
        
        body {
            font-family: 'Noto Sans TC', sans-serif;
            background-color: #f8fafc;
            color: #1e293b;
            overflow-x: hidden; /* Prevent horizontal scroll on mobile */
        }

        /* CAD Styling */
        .cad-wall { fill: none; stroke: #0f172a; stroke-width: 2.5; stroke-linecap: square; }
        .cad-furniture { fill: #f1f5f9; stroke: #475569; stroke-width: 1.2; }
        .cad-chair { fill: #e2e8f0; stroke: #334155; stroke-width: 1.2; }
        .cad-dim-line { stroke: #64748b; stroke-width: 0.8; }
        .cad-dim-text { font-family: monospace; font-size: 9px; fill: #475569; font-weight: bold; }
        .cad-door-swing { fill: none; stroke: #64748b; stroke-width: 1; stroke-dasharray: 3,3; }

        /* Loader */
        .loader {
            border: 3px solid rgba(255,255,255,0.3);
            border-top: 3px solid #ffffff;
            border-radius: 50%;
            width: 16px;
            height: 16px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        /* Input styling */
        input[type=number] {
            color: #0f172a;
            font-weight: 700;
        }
        input[type=number]::-webkit-inner-spin-button, 
        input[type=number]::-webkit-outer-spin-button {  
           -webkit-appearance: none;
           margin: 0;
        }
        input[type=number] {
            -moz-appearance: textfield;
        }

        /* Print Container Handling */
        #print-staging-area {
            position: fixed;
            left: -9999px;
            top: 0;
            z-index: -100;
        }

        /* A4 specific width for the staging pages */
        .a4-page {
            width: 794px; /* A4 width at 96 DPI */
            min-height: 1123px; /* A4 height */
            padding: 40px;
            background: white;
            box-sizing: border-box;
            position: relative;
        }

        .area-rect { transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1); }
    </style>
    <!-- Google tag (gtag.js) -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-5YQY4RT9H2"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());

  gtag('config', 'G-5YQY4RT9H2');
</script>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useMemo } = React;

        const DATA = {
            desk: {
                small: { label: "高密度 3.5m²", area: 3.5, desc: "適合高密度排排坐或流動辦公位 (約 3.5 m²/人)" },
                medium: { label: "標準 5.0m²", area: 5.0, desc: "標準 L 型屏風座位，兼顧隱私與效率 (約 5.0 m²/人)" },
                large: { label: "寬敞 7.5m²", area: 7.5, desc: "獨立大桌或主管位，空間寬敞舒適 (約 7.5 m²/人)" }
            },
            room: {
                standardManager: { label: "標準主管室", area: 12 },
                seniorExec: { label: "高級主管室", area: 24 },
                phoneBooth: { label: "電話亭/專注", area: 2 },
                meetSmall: { label: "小洽談室", area: 10 },
                meetMedium: { label: "中會議室", area: 20 },
                meetLarge: { label: "大會議室", area: 45 },
                boardOffice: { label: "董事會議室", area: 60 },
            }
        };

        // --- Component: Smart Control Input ---
        const SmartControl = ({ value, onChange, min = 0, step = 1, unit = "", large = false }) => {
            const handleDecrement = () => {
                const current = value === '' ? 0 : parseFloat(value);
                const next = Math.max(min, current - step);
                onChange(parseFloat(next.toFixed(2)));
            };
            const handleIncrement = () => {
                const current = value === '' ? 0 : parseFloat(value);
                const next = current + step;
                onChange(parseFloat(next.toFixed(2)));
            };
            const handleInputChange = (e) => {
                const val = e.target.value;
                if (val === '') { onChange(''); return; }
                // Allow decimal point and digits
                if (!isNaN(val)) { onChange(val); }
            };
            const handleBlur = () => {
                if (value === '' || value === '.') { onChange(min); } 
                else { onChange(parseFloat(value)); }
            };

            return (
                <div className={`flex items-center border border-slate-300 rounded-lg overflow-hidden bg-white shadow-sm ${large ? 'h-12 max-w-[160px]' : 'h-10 max-w-[120px]'} w-full`}>
                    <button onClick={handleDecrement} className={`${large ? 'w-12' : 'w-10'} h-full flex items-center justify-center bg-slate-100 hover:bg-slate-200 text-slate-600 border-r border-slate-200 active:bg-slate-300 transition-colors touch-manipulation`} type="button"><i className="fas fa-minus text-xs"></i></button>
                    <div className="flex-grow relative h-full min-w-[30px]">
                        <input type="number" inputMode="decimal" value={value} onChange={handleInputChange} onBlur={handleBlur} className={`w-full h-full text-center font-bold text-slate-800 outline-none bg-white px-0 ${large ? 'text-lg' : 'text-sm'}`} placeholder="0"/>
                        {unit && <span className="absolute right-0 top-1/2 transform -translate-y-1/2 text-[10px] text-slate-400 pointer-events-none bg-white pr-2">{unit}</span>}
                    </div>
                    <button onClick={handleIncrement} className={`${large ? 'w-12' : 'w-10'} h-full flex items-center justify-center bg-slate-100 hover:bg-slate-200 text-slate-600 border-l border-slate-200 active:bg-slate-300 transition-colors touch-manipulation`} type="button"><i className="fas fa-plus text-xs"></i></button>
                </div>
            );
        };

        // --- Extracted Components (Crucial Fix: Moved outside App to maintain focus) ---
        
        const StaffCard = ({ group, index, onChange, onRemove }) => (
            <div className="bg-slate-50 border border-slate-200 rounded-xl p-4 mb-3 relative hover:border-blue-300 transition-colors">
                <div className="flex justify-between items-center mb-3">
                    <span className="font-bold text-slate-700 text-sm flex items-center">
                        <span className="w-1.5 h-4 bg-blue-500 rounded-full mr-2"></span>{group.name}
                    </span>
                    {onRemove && (
                        <button onClick={onRemove} className="text-slate-400 hover:text-red-500 transition-colors px-2"><i className="fas fa-trash-alt"></i></button>
                    )}
                </div>
                
                <div className="grid grid-cols-2 gap-4 mb-4">
                    <div>
                        <label className="text-xs font-bold text-slate-400 uppercase mb-1 block">現有人數</label>
                        <SmartControl value={group.headcount} onChange={(val)=>onChange(index, 'headcount', val)} min={0} />
                    </div>
                    <div>
                        <label className="text-xs font-bold text-slate-400 uppercase mb-1 block">成長 %</label>
                        <SmartControl value={group.growth} onChange={(val)=>onChange(index, 'growth', val)} min={0} unit="%" />
                    </div>
                </div>

                <div>
                    <label className="text-xs font-bold text-slate-400 uppercase mb-2 block">座位配置風格</label>
                    <div className="grid grid-cols-3 gap-2">
                        {['small', 'medium', 'large'].map(t => (
                            <div 
                                key={t} 
                                onClick={()=>onChange(index, 'deskType', t)}
                                className={`cursor-pointer border rounded-lg overflow-hidden transition-all ${group.deskType === t ? 'border-blue-500 ring-1 ring-blue-200 shadow-sm' : 'border-slate-200 hover:border-slate-300'}`}
                            >
                                <div className="h-10 sm:h-14 bg-white p-1 relative">
                                        <div className="absolute inset-0 flex items-center justify-center"><SvgDesk type={t} /></div>
                                </div>
                                <div className={`text-[10px] sm:text-xs py-1.5 text-center font-bold truncate px-1 ${group.deskType === t ? 'bg-blue-500 text-white' : 'bg-slate-50 text-slate-500'}`}>
                                    {DATA.desk[t].label}
                                </div>
                            </div>
                        ))}
                    </div>
                </div>
            </div>
        );

        const SectionHeader = ({ icon, title, color = "text-slate-800" }) => (
            <div className={`flex items-center gap-2 mb-4 pb-2 border-b border-slate-200 ${color}`}><div className="w-8 h-8 rounded-full bg-white border border-slate-300 shadow-sm flex items-center justify-center flex-shrink-0"><i className={`fas ${icon} text-sm`}></i></div><h3 className="font-bold text-lg">{title}</h3></div>
        );

        const RoomCard = ({ type, label, area, value, onChange }) => (
            <div className="flex items-center bg-white p-2 rounded-xl border border-slate-200 shadow-sm hover:border-blue-300 transition-colors min-h-[5rem]">
                <div className="w-20 sm:w-24 h-16 bg-slate-50 border border-slate-100 rounded-lg flex-shrink-0 overflow-hidden mr-3 relative"><div className="absolute inset-0 transform scale-150 origin-center flex items-center justify-center"><SvgRoom type={type} /></div></div>
                <div className="flex-grow flex flex-col justify-center min-w-0 pr-2">
                    <div className="font-bold text-slate-700 text-sm truncate leading-tight mb-1">{label}</div>
                    <div className="text-[11px] text-slate-400 font-medium">{area} m²</div>
                </div>
                <div className="flex-shrink-0"><SmartControl value={value} onChange={onChange} min={0} /></div>
            </div>
        );

        const SupportInput = ({ label, icon, value, onChange, unit="m²" }) => (
            <div className="bg-white p-2 rounded-lg border border-slate-300 flex items-center justify-between h-12">
                <div className="flex items-center gap-2 overflow-hidden mr-2"><i className={`fas ${icon} text-slate-400 w-4 text-center flex-shrink-0`}></i><span className="text-sm font-bold text-slate-600 truncate">{label}</span></div>
                <div className="flex-shrink-0"><SmartControl value={value} onChange={onChange} min={0} unit={unit} /></div>
            </div>
        );

        // --- Component: Stacked Bar Chart ---
        const SpaceUsageBar = ({ data, total }) => {
            if (!total || total === 0) return null;
            return (
                <div className="w-full mb-6">
                    <div className="flex h-8 w-full rounded-lg overflow-hidden border border-slate-300 shadow-sm mb-4 bg-white">
                        {data.map((item, idx) => (
                            <div key={idx} className="h-full transition-all duration-500 relative group border-r border-white/20 last:border-0" style={{ width: `${(item.value / total) * 100}%`, backgroundColor: item.color }}></div>
                        ))}
                    </div>
                    <div className="flex flex-col gap-y-2">
                        {data.map((item, idx) => (
                            <div key={idx} className="flex justify-between items-center text-sm border-b border-dashed border-slate-200 pb-1">
                                <div className="flex items-center">
                                    <div className="w-3 h-3 rounded-full mr-3 shadow-sm flex-shrink-0" style={{ backgroundColor: item.color }}></div>
                                    <span className="text-slate-700 font-bold">{item.label}</span>
                                </div>
                                <div className="text-slate-900 font-bold font-mono">
                                    {item.value?.toFixed(0)} <span className="text-xs font-normal text-slate-500">m²</span>
                                    <span className="ml-2 text-xs text-slate-600 font-bold w-12 inline-block text-right">{((item.value/total)*100).toFixed(0)}%</span>
                                </div>
                            </div>
                        ))}
                    </div>
                </div>
            );
        };

        // --- Component: Hierarchy Area Treemap (Updated for Custom Styling) ---
        const AreaTreemap = ({ results, containerClass, svgClass }) => {
            if (!results.rentableArea) return null;
            const w = 400; const h = 220; 
            const loadRatio = (results.rentableArea - results.usableArea) / results.rentableArea;
            const loadW = w * loadRatio; const usableW = w - loadW;
            const circRatio = (results.usableArea - results.netArea) / results.usableArea;
            const circH = h * circRatio; const netH = h - circH;
            const netArea = results.netArea;
            const deskRatio = results.areaDesk / netArea; const roomRatio = results.areaRooms / netArea; const supportRatio = results.areaSupport / netArea;
            const deskW = usableW * deskRatio; const roomW = usableW * roomRatio; const supportW = usableW * supportRatio;
            
            const cLoad = "#64748b"; const cCirc = "#8b5cf6"; const cDesk = "#3b82f6"; const cRoom = "#10b981"; const cSupp = "#f59e0b"; 
            const getPct = (val) => `${((val / results.rentableArea) * 100).toFixed(0)}%`;

            // Default classes if not provided
            const finalContainerClass = containerClass || "w-full select-none mt-6 pt-4 border-t border-slate-200";
            const finalSvgClass = svgClass || "w-full h-auto rounded-lg shadow border border-slate-300 bg-white";

            return (
                <div className={finalContainerClass}>
                    <h4 className="text-sm font-bold text-slate-600 uppercase tracking-wider mb-3">面積結構分佈 (Structure)</h4>
                    <svg viewBox={`0 0 ${w} ${h}`} className={finalSvgClass}>
                        <rect x={usableW} y={0} width={loadW} height={h} fill={cLoad} className="area-rect stroke-white stroke-[2px]" />
                        <text x={usableW + loadW/2} y={h/2} textAnchor="middle" fill="white" fontSize="11" fontWeight="bold" transform={`rotate(90, ${usableW + loadW/2}, ${h/2})`} style={{textShadow: '0px 1px 2px rgba(0,0,0,0.3)'}}>公設 {(results.rentableArea - results.usableArea).toFixed(0)}m²</text>

                        <rect x={0} y={netH} width={usableW} height={circH} fill={cCirc} className="area-rect stroke-white stroke-[2px]" />
                        <text x={usableW/2} y={netH + circH/2 + 4} textAnchor="middle" fill="white" fontSize="11" fontWeight="bold" style={{textShadow: '0px 1px 2px rgba(0,0,0,0.3)'}}>走道{(results.usableArea - results.netArea).toFixed(0)}m²</text>

                        <rect x={0} y={0} width={deskW} height={netH} fill={cDesk} className="area-rect stroke-white stroke-[2px]" />
                        {deskW > 45 && (<text x={deskW/2} y={netH/2} textAnchor="middle" fill="white" fontSize="11" fontWeight="bold" style={{textShadow: '0px 1px 2px rgba(0,0,0,0.3)'}}><tspan x={deskW/2} dy="-0.6em">座位</tspan><tspan x={deskW/2} dy="1.2em" fontSize="10">{results.areaDesk.toFixed(0)}m²</tspan></text>)}
                        
                        <rect x={deskW} y={0} width={roomW} height={netH} fill={cRoom} className="area-rect stroke-white stroke-[2px]" />
                        {roomW > 45 && (<text x={deskW + roomW/2} y={netH/2} textAnchor="middle" fill="white" fontSize="11" fontWeight="bold" style={{textShadow: '0px 1px 2px rgba(0,0,0,0.3)'}}><tspan x={deskW + roomW/2} dy="-0.6em">房間</tspan><tspan x={deskW + roomW/2} dy="1.2em" fontSize="10">{results.areaRooms.toFixed(0)}m²</tspan></text>)}
                        
                        <rect x={deskW + roomW} y={0} width={usableW - deskW - roomW} height={netH} fill={cSupp} className="area-rect stroke-white stroke-[2px]" />
                        {(usableW - deskW - roomW) > 45 && (<text x={deskW + roomW + (usableW - deskW - roomW)/2} y={netH/2} textAnchor="middle" fill="white" fontSize="11" fontWeight="bold" style={{textShadow: '0px 1px 2px rgba(0,0,0,0.3)'}}><tspan x={deskW + roomW + (usableW - deskW - roomW)/2} dy="-0.6em">支援</tspan><tspan x={deskW + roomW + (usableW - deskW - roomW)/2} dy="1.2em" fontSize="10">{results.areaSupport.toFixed(0)}m²</tspan></text>)}
                    </svg>
                </div>
            );
        };

        // --- CAD SVG Components ---
        const SvgDefs = () => (<defs><marker id="arrow-start" markerWidth="6" markerHeight="6" refX="0" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M6,0 L0,3 L6,6" fill="none" stroke="#64748b" strokeWidth="1" /></marker><marker id="arrow-end" markerWidth="6" markerHeight="6" refX="6" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L6,3 L0,6" fill="none" stroke="#64748b" strokeWidth="1" /></marker></defs>);
        const Chair = ({ x, y, r = 0, scale = 1 }) => (<g transform={`translate(${x},${y}) rotate(${r}) scale(${scale})`}><rect x="-7" y="-7" width="14" height="14" rx="2" className="cad-chair" /><path d="M-7 -4 Q0 -8 7 -4" fill="none" stroke="#334155" /><line x="-8" y1="0" x2="-8" y2="6" stroke="#334155" strokeWidth="1" /><line x1="8" y1="0" x2="8" y2="6" stroke="#334155" strokeWidth="1" /></g>);
        const Dimension = ({ x1, y1, x2, y2, text, offset = 10, vertical = false }) => { if (vertical) return (<g><line x1={x1-offset} y1={y1} x2={x1-offset} y2={y2} className="cad-dim-line" markerStart="url(#arrow-start)" markerEnd="url(#arrow-end)" /><text x={x1-offset-4} y={(y1+y2)/2} className="cad-dim-text" transform={`rotate(-90 ${x1-offset-4} ${(y1+y2)/2})`} textAnchor="middle">{text}</text></g>); return (<g><line x1={x1} y1={y1+offset} x2={x2} y2={y2+offset} className="cad-dim-line" markerStart="url(#arrow-start)" markerEnd="url(#arrow-end)" /><text x={(x1+x2)/2} y={y1+offset+8} className="cad-dim-text" textAnchor="middle">{text}</text></g>); };

        const SvgDesk = ({ type }) => {
            return (
                <svg viewBox="0 0 160 120" className="w-full h-full bg-white" preserveAspectRatio="xMidYMid meet"><SvgDefs />
                    {type === 'small' && (<g transform="translate(20,20)"><rect x="0" y="20" width="120" height="40" className="cad-furniture" /><line x1="0" y1="40" x2="120" y2="40" stroke="#94a3b8" strokeDasharray="2,2" /><line x1="60" y1="20" x2="60" y2="60" stroke="#94a3b8" /><Chair x={30} y={10} r={180} /> <Chair x={90} y={10} r={180} /><Chair x={30} y={70} r={0} /> <Chair x={90} y={70} r={0} /><Dimension x1={0} y1={60} x2={60} y2={60} text="120" offset={15} /><Dimension x1={125} y1={20} x2={125} y2={60} text="140" offset={-5} vertical={true} /></g>)}
                    {type === 'medium' && (<g transform="translate(30,20)"><path d="M0 0 H60 V60 H0 Z" fill="none" stroke="#94a3b8" strokeDasharray="2,2" /><path d="M60 0 H120 V60 H60 Z" fill="none" stroke="#94a3b8" strokeDasharray="2,2" /><path d="M2 2 H58 V58 H38 V22 H2 Z" className="cad-furniture" /><Chair x={30} y={40} r={0} /><path d="M62 2 H118 V58 H98 V22 H62 Z" className="cad-furniture" /><Chair x={90} y={40} r={0} /><Dimension x1={0} y1={60} x2={60} y2={60} text="150" offset={10} /><Dimension x1={125} y1={0} x2={125} y2={60} text="150" offset={-5} vertical={true} /></g>)}
                    {type === 'large' && (<g transform="translate(30,25)"><rect x="0" y="0" width="100" height="15" className="cad-furniture" /><rect x="10" y="35" width="80" height="35" className="cad-furniture" /><rect x="70" y="35" width="20" height="50" className="cad-furniture" /><Chair x={50} y={25} r={180} /><Dimension x1={10} y1={70} x2={90} y2={70} text="180" offset={10} /></g>)}
                </svg>
            );
        };

        const SvgRoom = ({ type }) => {
            return (
                <svg viewBox="0 0 200 160" className="w-full h-full bg-white border border-slate-300" preserveAspectRatio="xMidYMid meet"><SvgDefs />
                    {type === 'standard' && (<g transform="translate(40,30)"><rect x="0" y="0" width="120" height="90" className="cad-wall" /><path d="M0 70 A 20 20 0 0 1 20 90" className="cad-door-swing" /><line x1="0" y1="70" x2="0" y2="90" stroke="white" strokeWidth="4" /><line x1="0" y1="90" x2="20" y2="75" stroke="#1f2937" strokeWidth="1.5" /><rect x="20" y="10" width="60" height="25" className="cad-furniture" /><Chair x={50} y={45} r={180} /><circle cx="90" cy="60" r="15" className="cad-furniture" /><Chair x={90} y={40} r={180} /> <Chair x={75} y={70} r={300} /> <Chair x={105} y={70} r={60} /><Dimension x1={0} y1={90} x2={120} y2={90} text="400" offset={10} /><Dimension x1={120} y1={0} x2={120} y2={90} text="300" offset={-10} vertical={true} /></g>)}
                    {type === 'senior' && (<g transform="translate(30,20)"><rect x="0" y="0" width="140" height="120" className="cad-wall" /><path d="M0 100 A 20 20 0 0 1 20 120" className="cad-door-swing" /><line x1="0" y1="100" x2="0" y2="120" stroke="white" strokeWidth="4" /><rect x="20" y="35" width="70" height="35" className="cad-furniture" /><Chair x={55} y={25} r={180} /><rect x="100" y="20" width="30" height="80" fill="#f1f5f9" stroke="#94a3b8" /><rect x="110" y="30" width="10" height="20" className="cad-chair" /><rect x="110" y="70" width="10" height="20" className="cad-chair" /><Dimension x1={0} y1={120} x2={140} y2={120} text="500" offset={10} /><Dimension x1={140} y1={0} x2={140} y2={120} text="500" offset={-10} vertical={true} /></g>)}

                    staffGroups: [...prev.staffGroups, { id: Date.now(), name: `人員配置 ${label}`, headcount: 0, growth: 0, sharing: 1.0, deskType: 'medium' }]

            const removeStaffGroup = (index) => {
                if (inputs.staffGroups.length <= 1) return;

                const renamed = newGroups.map((g, i) => ({ ...g, name: `人員配置 ${String.fromCharCode(65 + i)}` }));
                setInputs(prev => ({ ...prev, staffGroups: renamed }));
            };

            const update = (field, val) => setInputs(prev => ({ ...prev, [field]: val }));

            // --- Calculation ---
            useEffect(() => {

                                  (getVal(inputs.roomPhone) * DATA.room.phoneBooth.area) +
                                  (getVal(inputs.meetSmall) * DATA.room.meetSmall.area) +
                                  (getVal(inputs.meetMedium) * DATA.room.meetMedium.area) +
                                  (getVal(inputs.meetLarge) * DATA.room.meetLarge.area) +
                                  (getVal(inputs.roomBoard) * DATA.room.boardOffice.area);
                
                const areaSupport = getVal(inputs.reception) + getVal(inputs.pantry) + getVal(inputs.server) + getVal(inputs.storage) + getVal(inputs.otherSupport);
                
                const netArea = totalDeskArea + areaRooms + areaSupport;
                const usableArea = netArea * getVal(inputs.circulation);
                const pubRatio = getVal(inputs.publicRatio);
                const rentableArea = usableArea / (1 - (pubRatio / 100));

                const ping = rentableArea * 0.3025;
                const rangeMin = ping * 0.9;
                const rangeMax = ping * 1.1;

                // Financials (RANGES)
                const rent = getVal(inputs.rentPerPing);
                const mgmt = getVal(inputs.mgmtPerPing);
                const salePriceWan = getVal(inputs.salePricePerPingWan);

                // Calculate ranges
                const rentMin = rent * rangeMin;
                const rentMax = rent * rangeMax;
                const mgmtMin = mgmt * rangeMin;
                const mgmtMax = mgmt * rangeMax;
                const priceWanMin = salePriceWan * rangeMin;
                const priceWanMax = salePriceWan * rangeMax;

                // Old single values kept for chart scaling if needed, but not for display
                const totalMonthlyRent = (rent + mgmt) * ping;

                setResults({
                    totalPeople, desksNeeded: totalDesks, areaDesk: totalDeskArea, 
                    areaRooms, areaSupport, netArea, rentableArea, usableArea,
                    ping, rangeMin, rangeMax,
                    perPerson: rentableArea > 0 ? rentableArea / totalPeople : 0,
                    totalMonthlyRent, // Legacy
                    rentMin, rentMax, mgmtMin, mgmtMax, priceWanMin, priceWanMax
                });
            }, [inputs]);

            const generatePDF = async () => {
                setIsExporting(true);
                // Allow UI to update
                await new Promise(resolve => setTimeout(resolve, 500));
                
                try {
                    const doc = new window.jspdf.jsPDF('p', 'mm', 'a4'); 
                    const pageWidth = doc.internal.pageSize.getWidth(); // 210mm
                    
                    // Capture Page 1 (Summary) from hidden A4 container
                    const canvas1 = await html2canvas(pdfPage1Ref.current, { 
                        scale: 2, 
                        useCORS: true,
                        width: 794,
                        windowWidth: 794 
                    });
                    const imgData1 = canvas1.toDataURL('image/jpeg', 0.85);
                    const imgHeight1 = (canvas1.height * pageWidth) / canvas1.width;
                    doc.addImage(imgData1, 'JPEG', 0, 0, pageWidth, imgHeight1);
                    
                    // Capture Page 2 (Audit) from hidden A4 container
                    doc.addPage();
                    const canvas2 = await html2canvas(pdfPage2Ref.current, { 
                        scale: 2, 
                        useCORS: true,
                        width: 794,
                        windowWidth: 794
                    });
                    const imgData2 = canvas2.toDataURL('image/jpeg', 0.85);
                    const imgHeight2 = (canvas2.height * pageWidth) / canvas2.width;
                    doc.addImage(imgData2, 'JPEG', 0, 0, pageWidth, imgHeight2);

                    doc.save("Office_Space_Financial_Report.pdf");
                } catch (error) { 
                    console.error(error);
                    alert("匯出失敗，請重試"); 
                }
                setIsExporting(false);
            };

            const chartData = [
                { value: results.areaDesk || 0, color: '#3b82f6', label: '辦公座位' },
                { value: results.areaRooms || 0, color: '#10b981', label: '獨立房間' },
                { value: results.areaSupport || 0, color: '#f59e0b', label: '支援空間' },
                { value: (results.usableArea - results.netArea) || 0, color: '#8b5cf6', label: '走道空間' },
                { value: (results.rentableArea - results.usableArea) || 0, color: '#64748b', label: '大樓公設' },
            ];

            const isSaleMode = inputs.salePricePerPingWan > 0;

            return (
                <div className="min-h-screen bg-slate-50 pb-20 md:pb-0">
                    <div className="p-4 md:p-6 max-w-[1600px] mx-auto">
                        <div className="mb-6 text-center">
                            <h1 className="text-2xl md:text-3xl font-extrabold text-slate-800 mb-2">辦公空間需求計算器 <span className="text-sm font-normal text-slate-500 bg-slate-200 px-2 py-1 rounded ml-2 align-middle">beta版</span></h1>
                            <p className="text-red-700 text-xs md:text-sm font-bold bg-red-50 py-2 px-4 rounded-lg inline-block border border-red-200 shadow-sm mx-auto"><i className="fas fa-exclamation-triangle mr-2"></i>以上計算僅供參考，因各建物的柱位、格局等利用效率有所差異，可使用面積會有所增減。</p>
                        </div>

                        <div className="flex flex-col xl:flex-row gap-6">
                            {/* LEFT PANEL (Inputs) */}
                            <div className="xl:w-7/12 flex flex-col gap-6">
                                {/* Staff */}
                                <div className="bg-white p-5 md:p-6 rounded-2xl shadow-sm border border-slate-200">
                                    <SectionHeader icon="fa-users" title="1. 人員配置 (Staffing)" color="text-blue-700" />
                                    <div className="space-y-4">
                                        {inputs.staffGroups.map((group, index) => (
                                            <StaffCard key={group.id} group={group} index={index} onChange={updateStaffGroup} onRemove={() => removeStaffGroup(index)} />
                                        ))}
                                    </div>
                                    <button onClick={addStaffGroup} className="w-full py-3 border-2 border-dashed border-blue-200 rounded-xl text-blue-500 font-bold hover:bg-blue-50 hover:border-blue-300 transition-colors mt-2 flex items-center justify-center gap-2"><i className="fas fa-plus-circle"></i> 新增人員分組</button>
                                </div>

                                {/* Rooms */}
                                <div className="bg-white p-5 md:p-6 rounded-2xl shadow-sm border border-slate-200">
                                    <SectionHeader icon="fa-door-open" title="2. 房間配置 (Rooms)" color="text-emerald-700" />
                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-3">
                                        <RoomCard type="standard" label="標準主管室" area="12" value={inputs.roomStandard} onChange={(val) => update('roomStandard', val)} />
                                        <RoomCard type="senior" label="高級主管室" area="24" value={inputs.roomSenior} onChange={(val) => update('roomSenior', val)} />
                                        <RoomCard type="phone" label="電話亭/專注空間" area="2" value={inputs.roomPhone} onChange={(val) => update('roomPhone', val)} />
                                        <RoomCard type="small" label="小洽談室" area="10" value={inputs.meetSmall} onChange={(val) => update('meetSmall', val)} />
                                        <RoomCard type="medium" label="中會議室" area="20" value={inputs.meetMedium} onChange={(val) => update('meetMedium', val)} />
                                        <RoomCard type="large" label="大會議室" area="45" value={inputs.meetLarge} onChange={(val) => update('meetLarge', val)} />
                                        <RoomCard type="board" label="董事會議室" area="60" value={inputs.roomBoard} onChange={(val) => update('roomBoard', val)} />
                                    </div>
                                </div>

                                <div className="flex flex-col md:flex-row gap-6">
                                    <div className="w-full md:w-1/2 bg-white p-5 md:p-6 rounded-2xl shadow-sm border border-slate-200">
                                        <SectionHeader icon="fa-coffee" title="3. 支援空間" color="text-amber-700" />
                                        <div className="space-y-3">
                                            <SupportInput label="接待區" icon="fa-concierge-bell" value={inputs.reception} onChange={(val) => update('reception', val)} />
                                            <SupportInput label="茶水間" icon="fa-mug-hot" value={inputs.pantry} onChange={(val) => update('pantry', val)} />
                                            <SupportInput label="資訊機房" icon="fa-server" value={inputs.server} onChange={(val) => update('server', val)} />
                                            <SupportInput label="儲藏室" icon="fa-box" value={inputs.storage} onChange={(val) => update('storage', val)} />
                                            <SupportInput label="其他" icon="fa-plus-circle" value={inputs.otherSupport} onChange={(val) => update('otherSupport', val)} />
                                        </div>
                                    </div>
                                    <div className="w-full md:w-1/2 bg-white p-5 md:p-6 rounded-2xl shadow-sm border border-slate-200">
                                        <SectionHeader icon="fa-ruler-combined" title="4. 係數設定" color="text-purple-700" />
                                        <div className="space-y-4">
                                            <div className="bg-white border border-slate-300 p-3 rounded-lg">
                                                <div className="flex justify-between items-center mb-2"><div className="font-bold text-sm text-slate-700">內部走道係數</div><select value={inputs.circulation} onChange={(e)=>update('circulation', parseFloat(e.target.value))} className="border border-slate-300 rounded p-1 text-sm font-bold bg-slate-50 outline-none w-24 text-center"><option value="1.25">1.25</option><option value="1.35">1.35</option><option value="1.45">1.45</option></select></div>
                                                <div className="text-xs text-purple-600 bg-purple-50 p-2 rounded border border-purple-100">說明：{getCirculationDesc(inputs.circulation)}</div>
                                            </div>
                                            <div className="bg-white border border-slate-300 p-3 rounded-lg">
                                                <div className="flex justify-between items-center mb-2"><div className="font-bold text-sm text-slate-700">公設比 (%)</div><div className="w-28"><SmartControl value={inputs.publicRatio} onChange={(val)=>update('publicRatio', val)} min={0} max={60} unit="%" /></div></div>
                                                <div className="text-xs text-purple-600 bg-purple-50 p-2 rounded border border-purple-100">說明：實得率約 {100 - inputs.publicRatio}%</div>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                                
                                {/* New Financial Section */}
                                <div className="bg-white p-5 md:p-6 rounded-2xl shadow-sm border border-slate-200">
                                    <SectionHeader icon="fa-calculator" title="5. 預算預估 (Financials)" color="text-gray-700" />
                                    <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                                        <div>
                                            <label className="text-sm font-bold text-slate-500 mb-2 block">預計租金 (元/坪)</label>
                                            <SmartControl value={inputs.rentPerPing} onChange={(val) => update('rentPerPing', val)} min={0} step={100} large={true} />
                                        </div>
                                        <div>
                                            <label className="text-sm font-bold text-slate-500 mb-2 block">預計管理費 (元/坪)</label>
                                            <SmartControl value={inputs.mgmtPerPing} onChange={(val) => update('mgmtPerPing', val)} min={0} step={10} large={true} />
                                        </div>
                                        <div>
                                            <label className="text-sm font-bold text-slate-500 mb-2 block">預計售價 (萬元/坪)</label>
                                            <SmartControl value={inputs.salePricePerPingWan} onChange={(val) => update('salePricePerPingWan', val)} min={0} step={5} large={true} />
                                        </div>
                                    </div>
                                </div>
                            </div>

                            {/* RIGHT PANEL (Results & Visuals) */}
                            <div className="xl:w-5/12 flex flex-col gap-6">
                                {/* Factors Summary (Mobile only) */}
                                <div className="w-full bg-white p-4 rounded-2xl shadow-sm border border-slate-200 xl:hidden">
                                     <div className="flex justify-between text-sm"><span className="text-gray-500 font-bold">走道係數: {inputs.circulation}</span><span className="text-gray-500 font-bold">公設比: {inputs.publicRatio}%</span></div>
                                </div>

                                {/* Result Card */}
                                <div className="bg-black/70 text-white p-6 md:p-8 rounded-3xl shadow-2xl relative overflow-hidden" style={{paddingBottom: '2rem', lineHeight: '1.6'}}>
                                    <div className="absolute top-0 right-0 w-64 h-64 bg-slate-800 rounded-full mix-blend-overlay filter blur-3xl opacity-50 -mr-16 -mt-16"></div>
                                    <div className="relative z-10">
                                        <div className="text-yellow-400 text-xs md:text-sm font-bold uppercase tracking-widest mb-1">總需求面積 (Total Requirement)</div>
                                        <div className="flex items-baseline gap-2 mb-2"><div className="text-5xl md:text-6xl font-extrabold text-white" style={{lineHeight: 1.2}}>{results.ping?.toFixed(1)}</div><div className="text-xl md:text-2xl text-slate-400 font-medium">坪</div></div>
                                        <div className="flex items-center gap-2 text-sm text-cyan-300 font-mono mb-4 font-bold">= {results.rentableArea?.toFixed(1)} m² </div>
                                        
                                        {/* Efficiency Badge -> Changed to Recommended Range */}
                                        <div className="flex items-center gap-2 mb-4">
                                            <span className="text-xs text-slate-400 uppercase font-bold">建議面積區間 (±10%)</span>
                                            <span className="bg-blue-500 text-white text-xs font-bold px-2 py-0.5 rounded">{results.rangeMin?.toFixed(0)} ~ {results.rangeMax?.toFixed(0)} 坪</span>
                                        </div>

                                        {/* Financial Breakdown Grid (Three Columns with RANGES) */}
                                        <div className="mb-6">
                                            <div className="grid grid-cols-3 gap-2 text-center">
                                                {/* Rent Block */}
                                                <div className="bg-slate-800 bg-opacity-40 p-2 rounded border border-slate-600 flex flex-col justify-center">
                                                    <div className="text-[10px] text-slate-400 mb-1">月租金總計</div>
                                                    <div className="font-bold text-white text-xs md:text-sm leading-tight">
                                                        ${Math.round(results.rentMin).toLocaleString()} ~<br/>${Math.round(results.rentMax).toLocaleString()}
                                                    </div>
                                                </div>
                                                {/* Mgmt Block */}
                                                <div className="bg-slate-800 bg-opacity-40 p-2 rounded border border-slate-600 flex flex-col justify-center">
                                                     <div className="text-[10px] text-slate-400 mb-1">月管理費總計</div>
                                                     <div className="font-bold text-white text-xs md:text-sm leading-tight">
                                                        ${Math.round(results.mgmtMin).toLocaleString()} ~<br/>${Math.round(results.mgmtMax).toLocaleString()}
                                                     </div>
                                                </div>
                                                {/* Sale Block */}
                                                <div className="bg-slate-800 bg-opacity-40 p-2 rounded border border-slate-600 flex flex-col justify-center">
                                                     <div className="text-[10px] text-slate-400 mb-1">總售價預估</div>
                                                     <div className="font-bold text-white text-xs md:text-sm leading-tight">
                                                        {Math.round(results.priceWanMin).toLocaleString()}萬 ~<br/>{Math.round(results.priceWanMax).toLocaleString()}萬
                                                     </div>
                                                </div>
                                            </div>
                                        </div>

                                        <div className="grid grid-cols-2 gap-4 border-t border-slate-700 pt-4">
                                            <div><div className="text-xs text-slate-400 uppercase font-bold">總座位數</div><div className="text-xl md:text-2xl font-bold text-white">{results.desksNeeded} <span className="text-sm font-normal text-slate-400">席</span></div></div>
                                            <div><div className="text-xs text-slate-400 uppercase font-bold">人均使用</div><div className="text-xl md:text-2xl font-bold text-white">{results.perPerson?.toFixed(1)} <span className="text-sm font-normal text-slate-400">m²</span></div></div>
                                        </div>
                                        <button onClick={generatePDF} disabled={isExporting} className="mt-6 w-full bg-blue-600 hover:bg-blue-500 text-white font-bold py-3 md:py-4 rounded-xl shadow-lg transition-all active:scale-95 flex items-center justify-center gap-2 disabled:opacity-50 text-sm md:text-base">{isExporting ? <div className="loader"></div> : <i className="fas fa-file-pdf"></i>}{isExporting ? " 正在製作報告..." : " 下載完整報告 (A4)"}</button>
                                    </div>
                                </div>

                                {/* Visualizations */}
                                <div className="bg-white p-5 md:p-6 rounded-3xl shadow-sm border border-slate-200 flex-grow flex flex-col">
                                    <h3 className="text-lg font-bold text-slate-800 mb-4"><i className="fas fa-chart-pie text-blue-600 mr-2"></i>空間面積分布</h3>
                                    <div className="mb-6"><SpaceUsageBar data={chartData} total={results.rentableArea} /></div>
                                    <AreaTreemap results={results} />
                                </div>
                            </div>
                        </div>

                        {/* NEW: Visible Detailed Audit at the bottom */}
                        <div className="mt-8 bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
                            <DetailedAudit inputs={inputs} results={results} DATA={DATA} />
                        </div>
                    </div>

                    {/* --- HIDDEN PRINT STAGING AREA (Always A4 Sized) --- */}
                    <div id="print-staging-area">
                        {/* Page 1: Visual Summary */}
                        <div ref={pdfPage1Ref} className="a4-page">
                            <PDFPage1 inputs={inputs} results={results} chartData={chartData} />
                        </div>

                        {/* Page 2: Detailed Audit */}
                        <div ref={pdfPage2Ref} className="a4-page">
                            <DetailedAudit inputs={inputs} results={results} DATA={DATA} />
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
